services:
  - type: web
    name: audio-finder
    runtime: node
    buildCommand: npm install && mkdir -p node_modules/yt-dlp-exec/bin && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o node_modules/yt-dlp-exec/bin/yt-dlp && chmod +x node_modules/yt-dlp-exec/bin/yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
